<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Study Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: linear-gradient(135deg, #f0f4ff 0%, #e0e7ff 100%);
            min-height: 100vh;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.08);
        }

        .chat-window {
            display: none;
            bottom: 80px;
            left: 20px;
            width: 350px;
            height: 450px;
            z-index: 1000;
        }

        .modal {
            display: none;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- Top Navigation -->
    <nav class="max-w-7xl mx-auto mb-8 flex justify-between items-center bg-white/40 p-4 rounded-2xl border border-white/50 backdrop-blur-md">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center text-white font-bold shadow-lg shadow-indigo-200">
                AI
            </div>
            <span class="font-bold text-gray-800 text-lg hidden sm:block">StudyPulse</span>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="flex items-center gap-2 pr-4 border-r border-gray-300">
                <div class="text-right hidden sm:block">
                    <p class="text-sm font-semibold text-gray-800">Alex Johnson</p>
                    <p class="text-xs text-gray-500">alex.j@study.ai</p>
                </div>
                <div class="w-10 h-10 rounded-full bg-gradient-to-tr from-indigo-400 to-blue-400 border-2 border-white"></div>
            </div>
            <button onclick="window.location.href='index.html'" class="text-sm font-medium text-gray-600 hover:text-red-500 transition-colors">
                Logout
            </button>
        </div>
    </nav>

    <!-- Main Content Grid -->
    <main class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
        
        <!-- Summarize Notes Card -->
        <section class="glass-card rounded-3xl p-6 flex flex-col">
            <div class="flex items-center gap-3 mb-4">
                <div class="p-2 bg-blue-100 rounded-lg text-blue-600 text-xl">📝</div>
                <h2 class="font-bold text-gray-800">Summarize Notes</h2>
            </div>
            <textarea id="summaryText" class="w-full h-32 p-4 rounded-xl bg-white/50 border border-blue-100 focus:ring-2 focus:ring-blue-400 outline-none resize-none text-sm" placeholder="Paste your long notes here..."></textarea>
            <div class="mt-4 flex gap-2">
                <label class="flex-1 cursor-pointer flex items-center justify-center gap-2 bg-white border border-gray-200 py-2 rounded-xl hover:bg-gray-50 transition-all text-sm font-medium">
                    <input type="file" class="hidden"> 📷 Upload Image
                </label>
                <button onclick="showResult('Summary', 'Your notes have been analyzed. Main points: 1. Core concept identification. 2. Historical context. 3. Practical application examples.')" 
                        class="flex-1 bg-indigo-600 text-white py-2 rounded-xl hover:bg-indigo-700 font-semibold shadow-md shadow-indigo-100 transition-all">
                    Summarize
                </button>
            </div>
        </section>

        <!-- Quiz Generator Card -->
        <section class="glass-card rounded-3xl p-6 flex flex-col">
            <div class="flex items-center gap-3 mb-4">
                <div class="p-2 bg-purple-100 rounded-lg text-purple-600 text-xl">💡</div>
                <h2 class="font-bold text-gray-800">Quiz Generator</h2>
            </div>
            <textarea id="quizText" class="w-full h-32 p-4 rounded-xl bg-white/50 border border-purple-100 focus:ring-2 focus:ring-purple-400 outline-none resize-none text-sm" placeholder="Paste text to generate questions..."></textarea>
            <div class="mt-4 flex gap-2">
                <label class="flex-1 cursor-pointer flex items-center justify-center gap-2 bg-white border border-gray-200 py-2 rounded-xl hover:bg-gray-50 transition-all text-sm font-medium">
                    <input type="file" class="hidden"> 📷 Upload Image
                </label>
                <button onclick="showResult('AI Quiz', 'Q1: What is the primary function? \nQ2: Explain the relationship between X and Y...')" 
                        class="flex-1 bg-purple-600 text-white py-2 rounded-xl hover:bg-purple-700 font-semibold shadow-md shadow-purple-100 transition-all">
                    Generate Quiz
                </button>
            </div>
        </section>

        <!-- To-Do List Card -->
        <section class="glass-card rounded-3xl p-6 flex flex-col">
            <div class="flex items-center gap-3 mb-4">
                <div class="p-2 bg-green-100 rounded-lg text-green-600 text-xl">✅</div>
                <h2 class="font-bold text-gray-800">To-Do List</h2>
            </div>
            <div class="flex gap-2 mb-4">
                <input type="text" id="todoInput" class="flex-1 px-4 py-2 rounded-xl bg-white border border-gray-200 focus:ring-2 focus:ring-green-400 outline-none text-sm" placeholder="Next task...">
                <button onclick="addTodo()" class="bg-green-600 text-white px-4 py-2 rounded-xl hover:bg-green-700 font-bold">+</button>
            </div>
            <ul id="todoList" class="space-y-2 overflow-y-auto max-h-40 custom-scrollbar pr-2">
                <!-- Items injected here -->
            </ul>
        </section>

    </main>

    <!-- AI Floating Assistant -->
    <button onclick="toggleChat()" class="fixed bottom-6 left-6 w-14 h-14 bg-indigo-600 rounded-full shadow-xl shadow-indigo-300 flex items-center justify-center text-2xl hover:scale-110 transition-transform z-50">
        🤖
    </button>

    <div id="chatWindow" class="chat-window fixed glass-card rounded-2xl flex flex-col overflow-hidden shadow-2xl">
        <div class="bg-indigo-600 p-4 text-white flex justify-between items-center">
            <span class="font-bold">Study Assistant</span>
            <button onclick="toggleChat()" class="opacity-70 hover:opacity-100">✕</button>
        </div>
        <div id="chatBody" class="flex-1 p-4 overflow-y-auto space-y-4 text-sm custom-scrollbar">
            <div class="bg-indigo-50 text-indigo-800 p-3 rounded-2xl rounded-tl-none mr-8">
                Hi Alex! How can I help you study today?
            </div>
        </div>
        <div class="p-3 bg-white border-t border-gray-100 flex gap-2">
            <input type="text" id="chatInput" class="flex-1 outline-none text-sm" placeholder="Ask anything...">
            <button onclick="sendChatMessage()" class="text-indigo-600 font-bold">Send</button>
        </div>
    </div>

    <!-- Result Modal -->
    <div id="modal" class="modal fixed inset-0 flex items-center justify-center z-[2000] p-4">
        <div class="bg-white rounded-3xl w-full max-w-lg p-8 shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-gray-400 hover:text-gray-600">✕</button>
            <h3 id="modalTitle" class="text-2xl font-bold text-gray-800 mb-4">Result</h3>
            <div id="modalBody" class="text-gray-600 whitespace-pre-wrap leading-relaxed max-h-96 overflow-y-auto custom-scrollbar pr-2">
            </div>
            <button onclick="closeModal()" class="w-full mt-6 bg-gray-100 py-3 rounded-xl font-semibold hover:bg-gray-200 transition-colors">Close</button>
        </div>
    </div>

    <script>
        // Modal Logic
        function showResult(title, content) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerText = content;
            document.getElementById('modal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
        }

        // To-Do Logic
        function addTodo() {
            const input = document.getElementById('todoInput');
            const val = input.value.trim();
            if (val) {
                const li = document.createElement('li');
                li.className = "flex items-center justify-between p-3 bg-white/60 rounded-xl border border-white/50 group";
                li.innerHTML = `
                    <span class="text-sm text-gray-700">${val}</span>
                    <button onclick="this.parentElement.remove()" class="text-gray-400 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-opacity">✕</button>
                `;
                document.getElementById('todoList').prepend(li);
                input.value = '';
            }
        }

        // Chat Logic
        function toggleChat() {
            const chat = document.getElementById('chatWindow');
            chat.style.display = (chat.style.display === 'flex') ? 'none' : 'flex';
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const body = document.getElementById('chatBody');
            if (input.value.trim()) {
                // User Message
                const userMsg = document.createElement('div');
                userMsg.className = "bg-gray-100 text-gray-800 p-3 rounded-2xl rounded-tr-none ml-8 text-right";
                userMsg.innerText = input.value;
                body.appendChild(userMsg);

                // AI Response (Simulated)
                setTimeout(() => {
                    const aiMsg = document.createElement('div');
                    aiMsg.className = "bg-indigo-50 text-indigo-800 p-3 rounded-2xl rounded-tl-none mr-8";
                    aiMsg.innerText = "That's a great question! Based on your current notes, I recommend focusing on the second chapter.";
                    body.appendChild(aiMsg);
                    body.scrollTop = body.scrollHeight;
                }, 800);

                input.value = '';
                body.scrollTop = body.scrollHeight;
            }
        }

        // Handle Enter key for inputs
        document.getElementById('todoInput').addEventListener('keypress', e => { if(e.key === 'Enter') addTodo() });
        document.getElementById('chatInput').addEventListener('keypress', e => { if(e.key === 'Enter') sendChatMessage() });
    </script>
</body>
</html>
