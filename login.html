<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Auth | SaaS Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        .tab-active {
            color: #4f46e5;
            border-bottom: 2px solid #4f46e5;
        }

        .input-focus {
            transition: all 0.3s ease;
        }

        .input-focus:focus {
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
            border-color: #4f46e5;
        }

        .fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden-form {
            display: none;
        }
    </style>
</head>
<body class="p-4">

    <!-- Auth Container -->
    <div class="glass-card w-full max-w-md rounded-3xl p-8 md:p-10 transition-all duration-500">
        
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 tracking-tight">Welcome</h1>
            <p class="text-gray-500 mt-2">Manage your workflow seamlessly</p>
        </div>

        <!-- Tab Switcher -->
        <div class="flex border-b border-gray-200 mb-8">
            <button id="loginTab" onclick="switchTab('login')" class="flex-1 pb-4 text-sm font-semibold transition-all tab-active">Login</button>
            <button id="signupTab" onclick="switchTab('signup')" class="flex-1 pb-4 text-sm font-semibold text-gray-400 hover:text-gray-600 transition-all">Sign Up</button>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="hidden mb-6 p-3 rounded-xl bg-red-50 border border-red-100 text-red-600 text-xs font-medium text-center">
            Invalid credentials. Please try again.
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="fade-in space-y-5" onsubmit="handleAuth(event, 'login')">
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-2">Email Address</label>
                <input type="email" required class="input-focus w-full px-4 py-3 rounded-xl bg-white/50 border border-gray-200 outline-none text-gray-700" placeholder="name@company.com">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-2">Password</label>
                <input type="password" required class="input-focus w-full px-4 py-3 rounded-xl bg-white/50 border border-gray-200 outline-none text-gray-700" placeholder="••••••••">
            </div>
            <button type="submit" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 transition-all transform hover:-translate-y-0.5 active:scale-95">
                Sign In
            </button>
        </form>

        <!-- Signup Form -->
        <form id="signupForm" class="hidden-form fade-in space-y-5" onsubmit="handleAuth(event, 'signup')">
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-2">Work Email</label>
                <input type="email" required class="input-focus w-full px-4 py-3 rounded-xl bg-white/50 border border-gray-200 outline-none text-gray-700" placeholder="name@company.com">
            </div>
            <div>
                <label class="block text-xs font-bold text-gray-600 uppercase tracking-wider mb-2">Create Password</label>
                <input type="password" required class="input-focus w-full px-4 py-3 rounded-xl bg-white/50 border border-gray-200 outline-none text-gray-700" placeholder="At least 8 characters">
            </div>
            <button type="submit" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white font-bold rounded-xl shadow-lg shadow-indigo-200 transition-all transform hover:-translate-y-0.5 active:scale-95">
                Create Account
            </button>
        </form>

        <!-- Footer -->
        <div class="mt-8 text-center">
            <p class="text-xs text-gray-400">
                By continuing, you agree to our <a href="#" class="underline hover:text-indigo-500">Terms of Service</a>.
            </p>
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const errorDiv = document.getElementById('errorMessage');

        function switchTab(type) {
            errorDiv.classList.add('hidden');
            if (type === 'login') {
                loginForm.classList.remove('hidden-form');
                signupForm.classList.add('hidden-form');
                loginTab.classList.add('tab-active');
                signupTab.classList.remove('tab-active');
                signupTab.classList.add('text-gray-400');
            } else {
                signupForm.classList.remove('hidden-form');
                loginForm.classList.add('hidden-form');
                signupTab.classList.add('tab-active');
                signupTab.classList.remove('text-gray-400');
                loginTab.classList.remove('tab-active');
                loginTab.classList.add('text-gray-400');
            }
        }

        function handleAuth(event, type) {
            event.preventDefault();
            
            // Basic Simulation of Validation
            const email = event.target.querySelectorAll('input')[0].value;
            const password = event.target.querySelectorAll('input')[1].value;

            // Simple demo logic: If email includes "error", show error message
            if (email.includes('error')) {
                errorDiv.innerText = type === 'login' ? 'Invalid email or password.' : 'This email is already registered.';
                errorDiv.classList.remove('hidden');
            } else {
                // Success Redirect
                window.location.href = 'index.html';
            }
        }
    </script>
</body>
</html>
